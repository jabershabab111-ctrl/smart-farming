<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .register-box{
            background:#111827;
            padding:40px;
            width:400px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        .register-box h1{
            color:white;
            text-align:center;
            margin-bottom:10px;
        }

        .register-box p{
            color:#94a3b8;
            text-align:center;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:none;
            border-radius:10px;
            background:#1e293b;
            color:white;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border:1px solid #22c55e;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#22c55e;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#16a34a;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        .login-link a{
            color:#22c55e;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h1>Create Account</h1>

        <p>Register for Smart Farm System</p>

        <form>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email">

            <input type="password" placeholder="Password">

            <button type="submit">Register</button>

        </form>

        <div class="login-link">
            <a href="/">Back to Login</a>
        </div>

    </div>

</body>
</html>
