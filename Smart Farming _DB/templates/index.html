<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Farm System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="centered">
<div class="panel">
    <h1>Smart Farm System</h1>
    <p style="color:#9ca3af; margin-bottom:28px;">Manage your farm data in one place.</p>

    {% if not user_id %}
    <div style="display:flex; flex-direction:column; gap:12px;">
        <a href="/login"><button class="btn-login btn-full">Login</button></a>
        <a href="/register"><button class="btn-register btn-full">Create Account</button></a>
    </div>
    {% else %}
    <p style="color:#6ee7b7; margin-bottom:20px;">You are logged in.</p>
    <div style="display:flex; flex-direction:column; gap:12px;">
        <a href="/dashboard"><button class="btn-primary btn-full">Go to Dashboard</button></a>
        <a href="/logout"><button class="btn-logout btn-full">Logout</button></a>
    </div>
    {% endif %}
</div>
</body>
</html>
