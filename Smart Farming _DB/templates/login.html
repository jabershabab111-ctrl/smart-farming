<!DOCTYPE html>
<html>
<head>
    <title>Smart Farm Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f2937, #14532d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(0, 0, 0, 0.35);
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #d1d5db;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        a {
            color: #86efac;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Smart Farm System</h1>
        <p>Sign in to continue</p>

       <form method="POST">

<input type="email" name="email" placeholder="Email address">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

       </form>

        <p>Don't have an account? <a href="/register">Register</a></p>
    </div>
</body>
</html>
